<div class="macro-controls">
    <label>Dataset:</label>
    <select id="rrg-dataset" onchange="onRRGDatasetChange()">
        <option value="us">US Sectors</option>
        <option value="europe">Europe Sectors</option>
        <option value="global">Global Markets</option>
        <option value="futures">Futures Groups</option>
    </select>
    <label>Period:</label>
    <select id="rrg-period" onchange="loadRRG()">
        <option value="1y">1 Year</option>
        <option value="2y" selected>2 Years</option>
        <option value="3y">3 Years</option>
        <option value="5y">5 Years</option>
    </select>
    <label>Window:</label>
    <select id="rrg-window" onchange="loadRRG()">
        <option value="13" selected>Short (13w)</option>
        <option value="26">Long (26w)</option>
    </select>
    <label>Trail:</label>
    <select id="rrg-trail" onchange="loadRRG()">
        <option value="4">4 weeks</option>
        <option value="8" selected>8 weeks</option>
        <option value="13">13 weeks</option>
        <option value="26">26 weeks</option>
    </select>
    <span id="rrg-drill-controls" style="display:none;margin-left:16px">
        <label>Drill into:</label>
        <select id="rrg-drill-group" onchange="loadRRGDrill()">
            <option value="">— Overview —</option>
            <option value="Bonds">Bonds</option>
            <option value="Indices">Indices</option>
            <option value="FX">FX</option>
            <option value="Energy">Energy</option>
            <option value="Metals">Metals</option>
            <option value="Grains">Grains</option>
            <option value="Softs">Softs</option>
            <option value="Meats">Meats</option>
        </select>
    </span>
    <span id="rrg-loading" style="color:var(--amber);display:none;margin-left:12px">Loading...</span>
</div>
<div id="rrg-asset-selector" style="padding:6px 0;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
    <span style="font-size:11px;color:var(--text-faint);font-weight:600;text-transform:uppercase;margin-right:4px">Show:</span>
    <button onclick="rrgSelectAll(true)" style="font-size:11px;padding:2px 8px;background:var(--bg-card);border:1px solid var(--border-light);color:var(--text-dim);border-radius:4px;cursor:pointer">All</button>
    <button onclick="rrgSelectAll(false)" style="font-size:11px;padding:2px 8px;background:var(--bg-card);border:1px solid var(--border-light);color:var(--text-dim);border-radius:4px;cursor:pointer">None</button>
    <span id="rrg-checkboxes" style="display:flex;gap:4px;flex-wrap:wrap;margin-left:4px"></span>
</div>
<div id="rrg-date-slider-wrap" style="display:none;padding:4px 0 8px">
    <div style="display:flex;align-items:center;gap:12px">
        <label style="font-size:12px;color:var(--text-dim);font-weight:600;white-space:nowrap">AS-OF DATE:</label>
        <input type="range" id="rrg-date-slider" min="0" max="100" value="100"
            style="flex:1;accent-color:var(--primary);cursor:pointer" oninput="onRRGDateSlider()">
        <span id="rrg-date-label" style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);min-width:90px;text-align:right">Latest</span>
    </div>
</div>
<div style="display:flex;gap:16px">
    <div id="rrg-chart" class="macro-chart" style="flex:3"></div>
    <div id="rrg-table" style="flex:1;max-height:600px;overflow-y:auto"></div>
</div>
